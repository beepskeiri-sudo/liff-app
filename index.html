<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div id="message">処理中...</div>
  <style>
  #message {
    font-size: 56px;          /* 文字を大きく */
    font-weight: bold;        /* 太字 */
    color: #222;              /* 濃い文字色 */
    text-align: center;       /* 横中央 */

    display: flex;
    justify-content: center;  /* 横中央 */
    align-items: center;      /* 縦中央 */

    height: 100vh;            /* 画面全体の高さ */
    width: 100%;

    line-height: 1.5;
    padding: 20px;

    background-color: #f9f9f9; /* 背景色 */
    white-space: pre-line;     /* \n を改行として表示 */
    }
   </style>

  <script>
function log(msg) {
      document.getElementById("message").innerText = msg;
      console.log(msg);
    }
async function sendStamp(action) {
  try {

 // liffIdセット
//log("1: liff.init開始");
//log(window.location.href);
    try {
  if (window.parent !== window) {
  // iframeの中にいる場合、親ウィンドウのURLを確認する処理
  // GASの場合は回避が難しいことが多いため、
  // 以下の設定で初期化を試みる
}    
  await liff.init({ liffId: "2009820268-v3E9yC4f", withLoginOnExternalBrowser: true 
    });
//  log("2: liff.init成功");
} catch (err) {
//  log("LIFF INIT ERROR: " + JSON.stringify(err));
  return;
}
  if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }
    // 修正ポイント2: パラメータをURLからではなくLIFFコンテキストから取る
    // (LINE内ブラウザで開いている場合、こちらの方が確実です)
    const context = liff.getContext();
    const profile = await liff.getProfile();
//log("3: profile取得成功");
 
 // URLパラメータ取得
    const params = new URLSearchParams(window.location.search);
    const action = params.get("action");
    const genbaCd = params.get("genba");
    const date = params.get("date");

// log("4: データ取得成功 (action:${action})");

    document.getElementById("message").innerText = "送信中...";
//log("5: fetch開始");

 // エンドポイントURLを変更
     const response = await fetch("https://script.google.com/macros/s/AKfycbyQqdkxzv88kkfp3dQntI1hWOZVhh8HxIBxIr9v9IP6jeMijmDC-1YgpuIBHokNgJ0/exec", 
 //     const response = await fetch("https://google.com",
    {
      method: "POST",
 //     headers: {
 //       "Content-Type": "application/json"
 //     },
      body: JSON.stringify({
        genbaCd: genbaCd,
        date: date,
        action: action,
        userId: profile.userId,
        displayName: profile.displayName
      })
    });
//log("6: fetch成功");

    const result = await response.json();

        document.getElementById("message").innerText = result.message || "完了しました";

      } catch (e) {
        document.getElementById("message").innerText = "エラー: " + e;
      }
    }
 // URLから action を取得
//log("0: action取得");
    const params = new URLSearchParams(window.location.search);
    const action = params.get("action");

    sendStamp(action);

</script>
</body>
</html>
